<!doctype html><html lang="el"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>FOUR WALLS</title><link rel="apple-touch-icon" href="/icon-180.png"><link rel="icon" type="image/png" href="/icon-192.png"><link rel="manifest" href="/manifest.webmanifest"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Four Walls"><meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#1C3457"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--navy:#1C3457;--pink:#FF0062;--ink:#242a33;--muted:#6b7280;--line:#d7dce3;--bg:#eef1f5;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);}
body{font-family:'Manrope','Segoe UI',Arial,sans-serif;color:var(--ink);font-size:16px;line-height:1.45;padding-bottom:96px;}
.wrap{max-width:860px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 14px 0;}
.apphd{display:flex;align-items:center;gap:12px;background:var(--navy);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;}
.apphd img{height:34px;}
.apphd .home{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;border-radius:8px;}
.apphd .home:active{opacity:.7;}
.apphd .wm .n{font-family:'Manrope';font-weight:800;letter-spacing:.12em;font-size:15px;line-height:1;}
.apphd .wm .s{font-family:'Manrope';font-weight:600;letter-spacing:.36em;font-size:7px;color:#ff8bbb;margin-top:3px;}
.apphd .ttl{margin-left:auto;text-align:right;font-weight:700;font-size:13px;max-width:52%;}
.steps{display:flex;gap:8px;margin:0 0 14px;}
.steps .s{flex:1;display:flex;align-items:center;gap:8px;justify-content:center;font-size:12px;font-weight:700;color:#93a0b2;padding:9px 6px;border-radius:11px;background:#fff;border:1px solid var(--line);}
.steps .s .num{width:22px;height:22px;border-radius:50%;background:#e6eaf0;color:#93a0b2;display:flex;align-items:center;justify-content:center;font-size:12px;}
.steps .s.on{color:#fff;background:var(--navy);border-color:var(--navy);}
.steps .s.on .num{background:var(--pink);color:#fff;}
.hide{display:none!important;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 14px 6px;margin-bottom:14px;box-shadow:0 1px 4px rgba(20,30,50,.05);}
.sect{font-family:'Manrope';font-weight:700;color:var(--navy);font-size:13px;letter-spacing:.02em;margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.sect::before{content:"";width:16px;height:4px;border-radius:2px;background:var(--pink);display:inline-block;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.f{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.f.full{grid-column:1 / -1;}
.f label{font-size:12.5px;font-weight:600;color:#41506a;}
.f input,.f select,.f textarea{font:inherit;font-size:16px;color:var(--ink);background:#fff;border:1.5px solid #cdd5e0;border-radius:10px;padding:11px 12px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,0,98,.12);}
.f textarea{min-height:74px;resize:vertical;}
.akin{border:1px dashed #c7cfdb;border-radius:12px;padding:10px 10px 2px;margin-bottom:12px;}
.akin .lab{font-family:'Manrope';font-weight:700;color:var(--pink);font-size:11px;letter-spacing:.05em;margin-bottom:8px;}
.sigwrap{margin-bottom:12px;}
.sigwrap .lab{font-size:12.5px;font-weight:600;color:#41506a;display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sigwrap .lab button{font:inherit;font-size:12px;color:var(--navy);background:#eef1f6;border:1px solid #d3dae4;border-radius:8px;padding:5px 10px;font-weight:600;}
.sigpad{width:100%;height:160px;background:#fcfcfd;border:1.5px dashed #b9c2cf;border-radius:12px;touch-action:none;display:block;}
.hintline{font-size:12px;color:var(--muted);margin:2px 2px 12px;}
.setrow{font-size:12.5px;color:var(--muted);}
.setrow summary{cursor:pointer;color:var(--navy);font-weight:600;}
/* preview */
.pvnote{font-size:12.5px;color:var(--muted);margin:0 2px 10px;text-align:center;}
#pvwrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(20,30,50,.08);}
#pvscale{transform-origin:top left;}
/* toolbar */
.bar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;max-width:860px;margin:0 auto;z-index:20;}
.btn{flex:1;font:inherit;font-weight:700;font-size:15px;border:none;border-radius:12px;padding:14px 12px;min-height:50px;cursor:pointer;}
.btn.p{background:var(--pink);color:#fff;}
.btn.s{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
.btn.g{background:#eef1f6;color:var(--navy);flex:0 0 auto;padding:14px 16px;}
.btn:active{transform:translateY(1px);}
.btn[disabled]{opacity:.55;}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:var(--navy);color:#fff;padding:11px 16px;border-radius:10px;font-size:14px;max-width:90%;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:30;display:none;}
.toast.ok{background:#12855b;}.toast.err{background:#b3261e;}
/* ===== generated document ===== */
.doc{width:720px;background:#fff;color:#242a33;font-family:'Manrope',Arial,sans-serif;font-size:13px;line-height:1.5;counter-reset:c;padding:18px 20px;}
.doc .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:2px solid var(--navy);padding-bottom:9px;position:relative;}
.doc .hd::after{content:"";position:absolute;left:0;bottom:-2px;width:150px;height:2px;background:var(--pink);}
.doc .brand{display:flex;align-items:center;gap:11px;}
.doc .brand img{height:46px;}
.doc .wm .n{font-family:'Manrope';font-weight:800;font-size:19px;letter-spacing:.13em;color:var(--navy);line-height:1;}
.doc .wm .s{font-family:'Manrope';font-weight:700;font-size:7px;letter-spacing:.42em;color:var(--pink);margin-top:4px;}
.doc .co{text-align:right;font-size:9.5px;color:var(--muted);line-height:1.5;}
.doc .co strong{color:var(--navy);}
.doc h1{font-family:'Manrope';font-weight:800;font-size:20px;color:var(--navy);margin:14px 0 0;}
.doc .accent{width:60px;height:4px;background:var(--pink);border-radius:2px;margin:8px 0 4px;}
.doc p{margin:0 0 7px;text-align:justify;}
.doc .lead{font-weight:700;color:var(--navy);margin:9px 0 3px;text-align:left;}
.doc ol.cl{list-style:none;padding:0;margin:7px 0;}
.doc ol.cl>li{counter-increment:c;position:relative;padding-left:30px;margin:7px 0;text-align:justify;}
.doc ol.cl>li::before{content:counter(c);position:absolute;left:0;top:0;font-family:'Manrope';font-weight:800;color:var(--pink);font-size:14px;}
.doc .val{font-weight:700;color:var(--navy);}
.doc .u{display:inline-block;min-width:60px;border-bottom:1px dotted #8a93a1;}
.doc .props{margin:8px 0 4px;}
.doc .frow{display:flex;gap:10px;margin:6px 0;align-items:baseline;}
.doc .frow .k{font-family:'Manrope';font-weight:700;color:var(--navy);font-size:12px;min-width:120px;}
.doc .frow .v2{flex:1;border-bottom:1px solid #cdd5e0;padding-bottom:2px;min-height:1.2em;font-weight:700;color:var(--navy);}
.doc table{width:100%;border-collapse:collapse;table-layout:fixed;margin:10px 0 6px;font-size:11.5px;}
.doc th{background:var(--navy);color:#fff;font-family:'Manrope';font-weight:700;font-size:9px;padding:7px 5px;text-align:left;line-height:1.2;}
.doc td{border:1px solid #b9c1cc;padding:7px 5px;height:30px;vertical-align:middle;font-weight:700;color:var(--navy);word-break:break-word;}
.doc th:nth-child(1),.doc td:nth-child(1){width:13%;}
.doc th:nth-child(3),.doc td:nth-child(3){width:9%;}
.doc .datel{margin:16px 0 2px;font-weight:700;color:var(--navy);}
.doc .signrow{display:flex;justify-content:space-between;gap:44px;margin-top:14px;}
.doc .sigcol{flex:1;text-align:center;}
.doc .sigcol .simg{height:66px;display:flex;align-items:flex-end;justify-content:center;}
.doc .sigcol .simg img{max-height:64px;max-width:94%;}
.doc .sigcol .ln{border-top:1px solid #444;margin-top:4px;}
.doc .sigcol .cap{margin-top:6px;font-family:'Manrope';font-weight:700;color:var(--navy);font-size:12px;}
.doc .ft{margin-top:16px;padding-top:8px;border-top:1px solid var(--line);color:#8a93a1;font-size:8.5px;text-align:center;}
.doc .rc-top{display:flex;justify-content:space-between;align-items:flex-end;margin:14px 0 0;}
.doc .rc-amt{font-family:'Manrope';font-weight:800;font-size:24px;color:var(--pink);}
.doc .rc-no{color:var(--muted);font-size:11px;margin:8px 0 0;}
.doc .rc-body{font-size:14px;line-height:1.75;margin:16px 0 6px;}
.doc .cut{display:flex;align-items:center;gap:10px;color:#aab2bd;font-size:10px;margin:16px 0;}
.doc .cut::before,.doc .cut::after{content:"";flex:1;border-top:1.5px dashed #c2c9d3;}
.doc .rcopy{border:1px solid var(--line);border-radius:6px;padding:12px 14px;}
.doc .rcmini{display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid var(--navy);padding-bottom:6px;}
.doc .rcmini img{height:30px;}
.doc .tag{font-family:'Manrope';font-weight:700;font-size:9px;letter-spacing:.05em;color:#fff;background:var(--navy);padding:3px 9px;border-radius:20px;}
.doc .pb{page-break-before:always;height:0;}
@media(max-width:640px){.grid{grid-template-columns:1fr;}.apphd .ttl{max-width:44%;font-size:12px;}.steps .s{font-size:11px;}}
@media print{.apphd,.steps,.bar,.toast,#step1,.pvnote,.setrow{display:none!important;}body{background:#fff!important;padding:0!important;}.wrap{max-width:none!important;margin:0!important;padding:0!important;}#step2{display:block!important;}#pvwrap{border:none!important;box-shadow:none!important;overflow:visible!important;height:auto!important;border-radius:0!important;}#pvscale{transform:none!important;}.doc{width:auto!important;padding:0!important;box-shadow:none!important;}@page{size:A4;margin:12mm;}}
.switch{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 0;}.switch input{position:absolute;opacity:0;width:0;height:0;}.switch .track{width:46px;height:27px;border-radius:20px;background:#cdd5e0;position:relative;transition:background .15s;flex:0 0 auto;}.switch .knob{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.28);}.switch input:checked + .track{background:var(--pink);}.switch input:checked + .track .knob{left:22px;}.switch .tlabel{font-size:13.5px;font-weight:600;color:#41506a;}.grp{grid-column:1/-1;}.grp[hidden]{display:none;}
</style>

 +'<li>Δηλώνω επίσης ότι έχω λάβει γνώση, δυνάμει του συνημμένου στο παρόν εντύπου ενημέρωσης - συγκατάθεσης, ότι ο εντολοδόχος μου τηρεί τα προσωπικά μου στοιχεία βάσει του νόμου περί προστασίας προσωπικών δεδομένων (ν. 4624/2019) και συναινώ στην με οποιαδήποτε τρόπο επικοινωνία μεταξύ μας.</li>'
 +'</ol>'
 +'<p>Παρέλαβα αντίγραφο της παρούσας εντολής.</p>'
 +'<div class="datel">Θεσσαλονίκη '+fmtDate(v.imerominia)+'</div>'
 +signRow('Ο ΕΝΤΟΛΕΑΣ','sig_entoleas','Ο ΜΕΣΙΤΗΣ','sig_mesitis',s)+FOOTER;
}
var CONFIG={id:'anathesi',title:'Εντολή Ανάθεσης',signs:[{k:'sig_entoleas',l:'Ο ΕΝΤΟΛΕΑΣ'},{k:'sig_mesitis',l:'Ο ΜΕΣΙΤΗΣ'}],sections:[{t:'Στοιχεία εντολέα',fields:[{k:'entoleas_onomatepwnymo',l:'Ονοματεπώνυμο'},{k:'entoleas_odos',l:'Κατοικία — Οδός & αριθμός',full:1},{k:'entoleas_tk',l:'Τ.Κ.',mode:'numeric'},{k:'entoleas_perioxi',l:'Περιοχή'},{k:'entoleas_adt',l:'Α.Δ.Τ. / Διαβατήριο'},{k:'adt_imerominia_ekdosis',l:'Ημ/νία έκδοσης',t:'date'},{k:'adt_arxi_ekdosis',l:'Αρχή έκδοσης'},{k:'entoleas_afm',l:'ΑΦΜ',mode:'numeric'},{k:'entoleas_email',l:'Email',t:'email',mode:'email'},{k:'entoleas_tilefono',l:'Τηλέφωνο',t:'tel',mode:'tel'},{t:'toggle',k:'has_proxy',grp:'proxy',full:1,l:'Ενεργεί κατ’ εντολή τρίτου (πληρεξούσιο)'},{k:'ekprosopoumenos',l:'Κατ’ εντολή του (ονοματεπώνυμο)',full:1,grp:'proxy'},{k:'plirexousio_imerominia',l:'Ημ/νία πληρεξουσίου',t:'date',grp:'proxy'}]},{t:'Στοιχεία ακινήτου',fields:[{t:'toggle',k:'enoikiasi',grp:'enoik',full:1,l:'Ενοικίαση (αντί για πώληση)'},{k:'akinito_odos',l:'Οδός & αριθμός',full:1},{k:'akinito_tk',l:'Τ.Κ.',mode:'numeric'},{k:'akinito_perioxi',l:'Περιοχή'},{k:'akinito_typos',l:'Τύπος ακινήτου'},{k:'akinito_epifaneia',l:'Επιφάνεια (τ.μ.)',mode:'numeric'},{k:'akinito_perigrafi',l:'Περιγραφή',t:'textarea',full:1}]},{t:'Αποκλειστικότητα',fields:[{t:'toggle',k:'apokleistikotita',grp:'apok',full:1,l:'Κατ’ αποκλειστικότητα — 0% αμοιβή εντολέα όσο ισχύει'},{k:'apok_diarkeia',l:'Διάρκεια (μήνες)',mode:'numeric',val:'6',grp:'apok'}]},{t:'Ημερομηνία',fields:[{k:'imerominia',l:'Ημερομηνία',t:'date'}]}],buildDoc:function(v,s){if(v.apokleistikotita)return APOK(v,s);return HEADER+'<h1>ΕΝΤΟΛΗ ΑΝΑΘΕΣΗΣ ΙΔΙΟΚΤΗΣΙΑΣ ΠΡΟΣ '+(v.enoikiasi?'ΕΚΜΙΣΘΩΣΗ':'ΠΩΛΗΣΗ')+'</h1><div class="accent"></div>'+personIntro(v,',')+'<p class="lead">Σας αναθέτω, με την ιδιότητά σας ως μεσίτη αστικών συμβάσεων:</p>'+'<ol class="cl"><li>Να βρείτε και να μου υποδείξετε ενδιαφερόμενους πελάτες σας ή να γνωστοποιήσετε απλά σ’ αυτούς τα στοιχεία της ιδιοκτησίας μου, ή να μεσολαβήσετε με σκοπό '+(v.enoikiasi?'την εκμίσθωση ή την χρηματοδοτική μίσθωση':'την πώληση ή ανταλλαγή ή την παραχώρηση προς ανοικοδόμηση με το σύστημα της αντιπαροχής ή την με οποιοδήποτε άλλον τρόπο μεταβίβαση του δικαιώματος κυριότητας ή χρήσης ή εκμετάλλευσης')+' της παρακάτω περιγραφόμενης ιδιοκτησίας μου:'+'<div class="props"><div class="frow"><span class="k">Διεύθυνση</span><span class="v2">'+V(ADDR(v.akinito_odos,v.akinito_tk,v.akinito_perioxi))+'</span></div><div class="frow"><span class="k">Τύπος Ακινήτου</span><span class="v2">'+V(v.akinito_typos)+'</span></div><div class="frow"><span class="k">Επιφάνεια</span><span class="v2">'+Vsqm(v.akinito_epifaneia)+'</span></div><div class="frow"><span class="k">Περιγραφή</span><span class="v2">'+V(v.akinito_perigrafi)+'</span></div></div>'+'<div>αντί του '+(v.enoikiasi?'μισθώματος':'τιμήματος')+' που θα συμφωνηθεί μεταξύ των συμβαλλόμενων μερών, ήτοι εμού και του υποψηφίου '+(v.enoikiasi?'μισθωτή':'αγοραστή')+', σε συνέχεια της δικής σας διαμεσολάβησης.</div></li></ol>'+'<p class="lead">Υπόσχομαι περαιτέρω και αναγνωρίζω τα εξής:</p>'+'<ol class="cl"><li>Στην περίπτωση που καταρτιστεί η σύμβαση μεταβίβασης του ως άνω περιγραφόμενου ακινήτου ή η σύμβαση εκμίσθωσης ή όποια άλλη μεταξύ εμού και του πελάτη σας ή μέλους της οικογένειάς του, των οικείων, συνεργατών, συνεταίρων αυτού, ή με νομικό πρόσωπο από το οποίο έλκει συμφέροντα ένας εξ αυτών, ή σε κάθε άλλη περίπτωση που καταρτιστεί η σύμβαση μεταβίβασης σε συνέχεια δικής σας υπόδειξης, είμαι υποχρεωμένος να σας καταβάλω την συμφωνηθείσα μεσιτική αμοιβή σας, η οποία ανέρχεται '+(v.enoikiasi?'στο <span class="val">50%</span> ενός μηνιαίου μισθώματος, πλέον ΦΠΑ 24%.':'σε ποσοστό <span class="val">δύο τοις εκατό (2%)</span> επί του τελικού τιμήματος της αγοραπωλησίας, με ελάχιστη αμοιβή το ποσό των <span class="val">1.000</span> ευρώ όταν το τίμημα είναι μικρότερο των <span class="val">50.000</span> ευρώ, πλέον ΦΠΑ 24%.')+' Την αμοιβή αυτή θεωρώ εύλογη, δίκαιη και ανταποκρινόμενη στις παρεχόμενες υπηρεσίες σας και υποχρεούμαι να σας την καταβάλω στη μεν περίπτωση υπογραφής προσυμφώνου το ½ αυτής κατά την ημέρα υπογραφής του προσυμφώνου και το υπόλοιπο ½ κατά την ημέρα υπογραφής του οριστικού συμβολαίου ή σύμβασης, στη δε περίπτωση υπογραφής μόνο οριστικής σύμβασης (πωλητηρίου συμβολαίου, ή εργολαβικού ή άλλου συμφωνητικού), ολόκληρη, χωρίς όχλησή μας από την οποία ρητώς παραιτούμαστε, κατά την ημέρα της υπογραφής τους, ακόμη και αν η σύμβαση καταρτισθεί υπό αναβλητική αίρεση, ενώ σε περίπτωση κατάρτισης σύμβασης μίσθωσης υποχρεούμαστε να σας την καταβάλουμε εξ ολοκλήρου και χωρίς άλλη όχλησή σας, από την οποία ρητώς παραιτούμαστε, την ημέρα υπογραφής του μισθωτηρίου συμβολαίου.</li>'+'<li>Συμφωνώ η παρούσα εντολή να είναι απρόθεσμη και συναινώ στην κατάρτιση σύμβασης μεσιτείας ανάμεσα σε σας και στους υποψήφιους αγοραστές ή μισθωτές, να συμβάλλεστε με όποιον αντισυμβαλλόμενο επιθυμείτε για το ανωτέρω ακίνητο στα πλαίσια εκπλήρωσης της δοθείσας εντολής με τον οποίο μπορείτε ελεύθερα να συμφωνείτε και να εισπράττετε μεσιτική αμοιβή, ανεξάρτητη και επιπλέον της αμοιβής που συμφωνείται με την παρούσα.</li>'+'<li>Οφείλω να σας ενημερώνω τουλάχιστον 24 ώρες πριν από την επίσκεψη της ιδιοκτησίας από υποψήφιους αγοραστές ή μισθωτές, πλην εξαιρετικών περιπτώσεων, οπότε θα επιτρέπεται η ενημέρωσή σας εντός της ίδιας ημέρας μετά από προηγούμενη συνεννόηση. Δεσμεύομαι ότι η επίσκεψη του ακινήτου θα είναι απρόσκοπτη και χωρίς την παρουσία τρίτων προσώπων. Στην περίπτωση που τα κλειδιά της ιδιοκτησίας βρίσκονται ήδη στα χέρια σας, οφείλω σε κάθε περίπτωση να σας ενημερώνω για την επίσκεψη του ακινήτου 24 ώρες πριν.</li>'+'<li>Δεσμεύομαι να σας ενημερώσω μία τουλάχιστον πλήρη εργάσιμη ημέρα πριν από την υπογραφή του συμβολαίου μεταβίβασης ή του μισθωτηρίου συμβολαίου, προκειμένου να προσέλθετε στον συμβολαιογράφο ή στον τόπο υπογραφής του μισθωτηρίου συμβολαίου αντίστοιχα, ώστε να δηλωθεί η διαμεσολάβησή σας στην καταρτισθείσα σύμβαση και να σας καταβάλω την συμφωνηθείσα αμοιβή σας, λαμβάνοντας από εσάς την αντίστοιχη απόδειξη παροχής υπηρεσιών σας.</li>'+'<li>Συναινώ επίσης με την παρούσα εντολή να αναρτήσετε κείμενα και φωτογραφίες στην ιστοσελίδα σας και σε διάφορα portal real estate και κοινωνικά δίκτυα, έντυπα, να το προωθήσετε σε ενδιαφερόμενους και συναδέλφους σας για την καλύτερη και αποτελεσματικότερη διαδικασία πώλησης ή εκμίσθωσης του ακινήτου μου.</li>'+'<li>Δηλώνω επίσης ότι έχω λάβει γνώση, δυνάμει του συνημμένου στο παρόν εντύπου ενημέρωσης - συγκατάθεσης, ότι ο εντολοδόχος μου τηρεί τα προσωπικά μου στοιχεία βάσει του νόμου περί προστασίας προσωπικών δεδομένων (ν. 4624/2019) και συναινώ στην με οποιαδήποτε τρόπο επικοινωνία μεταξύ μας.</li></ol>'+'<p>Παρέλαβα αντίγραφο της παρούσας εντολής.</p>'+'<div class="datel">Θεσσαλονίκη '+fmtDate(v.imerominia)+'</div>'+signRow('Ο ΕΝΤΟΛΕΑΣ','sig_entoleas','Ο ΜΕΣΙΤΗΣ','sig_mesitis',s)+FOOTER;}};</script>
