<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="format-detection" content="telephone=no">
<title>Four Walls · Καταχώριση ακινήτου</title>
<link rel="apple-touch-icon" href="https://four-walls.gr/forms/icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest" crossorigin="use-credentials">
<meta name="apple-mobile-web-app-title" content="Four Walls">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="html2pdf.bundle.min.js"></script>
<style>
:root{
  --navy:#1C3457; --navy2:#25406a; --pink:#FF0062; --pink-soft:#ffe6ef;
  --ink:#1a1f2b; --muted:#727a8c; --line:#e5e8ef; --bg:#eef1f6; --card:#ffffff;
  --ok:#1f9d63; --radius:16px; --radius-sm:12px;
  --shadow:0 1px 2px rgba(28,52,87,.05),0 8px 24px rgba(28,52,87,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--ink);background:var(--bg);
  font-size:16px;line-height:1.4;-webkit-text-size-adjust:100%;
  padding-bottom:96px;
}
h1,h2,h3,.brandmark{font-family:"Manrope",-apple-system,"Segoe UI",sans-serif}

/* Top bar */
.topbar{
  position:sticky;top:0;z-index:40;background:var(--card);
  border-bottom:1px solid var(--line);position:relative;text-align:center;
  padding:calc(env(safe-area-inset-top) + 12px) 56px 12px;
}
#brandLogo{display:none}
.brand{display:flex;align-items:center;justify-content:center;gap:11px}
.topbar .home{text-decoration:none;color:inherit;display:block}
.topbar .home:active{opacity:.7}
.brand .cube{height:48px;width:auto;display:block}
.brand .wm{font-family:"Manrope",sans-serif;font-weight:800;font-size:23px;letter-spacing:.05em;color:var(--navy);line-height:1}
.topbar .t{margin-top:5px}
.topbar .t .h{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:.02em}
.gear{
  position:absolute;top:50%;right:14px;transform:translateY(-50%);
  border:1px solid var(--line);background:var(--card);color:var(--muted);
  width:44px;height:44px;border-radius:12px;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.gear:active{background:var(--bg)}

main{max-width:860px;margin:0 auto;padding:18px 16px 8px}
.lead{color:var(--muted);font-size:14px;margin:2px 0 18px}

/* Cards / sections */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px 16px;margin-bottom:16px}
.card > h2{font-size:16px;margin:0 0 4px;color:var(--navy);display:flex;align-items:center;gap:9px}
.card > h2 .dot{width:9px;height:9px;border-radius:3px;background:var(--pink);flex:0 0 auto}
.card > .hint{color:var(--muted);font-size:12.5px;margin:0 0 14px}

/* Field grids */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px 16px}
.grid.yn{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid.narrow{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.field{display:flex;flex-direction:column;gap:7px;min-width:0}
.field label{font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.01em}
.inp{position:relative;display:flex;align-items:center}
input,select,textarea{
  width:100%;font-family:inherit;font-size:16px;color:var(--ink);
  background:#fbfcfe;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  padding:13px 14px;min-height:52px;outline:none;transition:border-color .12s,background .12s;
}
textarea{min-height:96px;resize:vertical;line-height:1.5}
input:focus,select,textarea:focus,select:focus{border-color:var(--navy2);background:#fff}
input:focus{border-color:var(--navy2);background:#fff}
select{appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23727a8c' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
.inp .suffix{position:absolute;right:14px;color:var(--muted);font-size:14px;font-weight:600;pointer-events:none}
.inp.has-suffix input{padding-right:44px}
input::placeholder,textarea::placeholder{color:#aab0bf}
input.invalid,select.invalid{border-color:var(--pink);background:#fff6f9}

/* Segmented single-choice */
.seg{display:flex;flex-wrap:wrap;gap:8px}
.seg button, .pill{
  font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;
  padding:12px 15px;min-height:48px;border-radius:12px;border:1.5px solid var(--line);
  background:#fbfcfe;color:var(--ink);transition:.12s;line-height:1.15;
}
.seg button:active,.pill:active{transform:scale(.98)}
.seg button.on{background:var(--navy);border-color:var(--navy);color:#fff}
.seg.req.miss button{border-color:var(--pink)}

/* Yes/No tri-state */
.yn-row{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fbfcfe}
.yn-row .lbl{font-size:14.5px;font-weight:600;color:var(--ink)}
.yn{display:flex;gap:6px;flex:0 0 auto}
.yn button{width:52px;min-height:42px;border-radius:10px;border:1.5px solid var(--line);
  background:#fff;font-family:inherit;font-weight:700;font-size:13.5px;color:var(--muted);cursor:pointer}
.yn button.on.yes{background:var(--pink);border-color:var(--pink);color:#fff}
.yn button.on.no{background:var(--navy);border-color:var(--navy);color:#fff}

/* Category selector */
.cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.cat{padding:14px;border:1.5px solid var(--line);border-radius:14px;background:#fbfcfe;
  cursor:pointer;text-align:left;font-weight:700;color:var(--navy);font-size:15px}
.cat .s{display:block;font-weight:500;font-size:12px;color:var(--muted);margin-top:3px}
.cat.on{border-color:var(--pink);background:var(--pink-soft)}
.subs{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
.subs .pill.on{background:var(--navy);border-color:var(--navy);color:#fff}

/* Action bar */
.actionbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.92);
  backdrop-filter:saturate(1.4) blur(8px);border-top:1px solid var(--line);
  padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);
  display:flex;gap:12px;max-width:860px;margin:0 auto}
.btn{font-family:inherit;font-size:16px;font-weight:700;border-radius:14px;padding:15px 18px;
  min-height:56px;cursor:pointer;border:1.5px solid var(--navy);flex:1;display:flex;
  align-items:center;justify-content:center;gap:8px}
.btn.primary{background:var(--navy);color:#fff;flex:2}
.btn.primary:active{background:var(--navy2)}
.btn.ghost{background:#fff;color:var(--navy)}
.btn:disabled{opacity:.55}

/* Modal + overlay */
.scrim{position:fixed;inset:0;background:rgba(20,28,45,.5);z-index:60;display:none;
  align-items:center;justify-content:center;padding:20px}
.scrim.show{display:flex}
.modal{background:#fff;border-radius:20px;max-width:460px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal h3{margin:0 0 6px;color:var(--navy);font-size:18px}
.modal p{margin:0 0 14px;color:var(--muted);font-size:13.5px;line-height:1.5}
.modal .row{display:flex;gap:10px;margin-top:16px}
.modal .row .btn{min-height:50px;font-size:15px}
.status{font-size:13px;margin-top:10px;font-weight:600}
.status.ok{color:var(--ok)}.status.err{color:var(--pink)}

/* Result overlay */
.result{text-align:center;max-width:440px}
.result .badge{width:74px;height:74px;border-radius:50%;margin:0 auto 16px;display:flex;
  align-items:center;justify-content:center;font-size:38px;color:#fff}
.result.ok .badge{background:var(--ok)}
.result.err .badge{background:var(--pink)}
.result h3{font-size:21px;margin:0 0 8px;color:var(--navy)}
.result p{color:var(--muted);font-size:14.5px;margin:0 0 4px;line-height:1.5}
.result .sum{background:var(--bg);border-radius:12px;padding:12px;margin:14px 0 4px;font-size:13.5px;color:var(--ink);text-align:left}

.saved-tag{font-size:11.5px;color:var(--muted);text-align:center;padding:4px 0 2px}

/* ===== Print document (branded, filled, print-only) ===== */
#printDoc{display:none}
#printDoc{color:#14213c;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.pd-head{text-align:center;border-bottom:3px solid var(--pink);padding-bottom:14px;margin-bottom:16px}
.pd-head img{height:54px;width:auto}
.pd-title{font-family:"Manrope",sans-serif;font-size:19px;font-weight:800;color:var(--navy);letter-spacing:.03em;margin:12px 0 4px}
.pd-meta{font-size:11px;color:#6b7385}
.pd-band{display:grid;grid-template-columns:1fr 1fr;gap:7px 26px;background:#f3f6fb;border:1px solid #e5e8ef;border-radius:10px;padding:13px 16px;margin-bottom:16px}
.pd-band .b{font-size:12.5px}
.pd-band .b b{color:var(--navy);font-weight:700}
.pd-sec{break-inside:avoid;margin-bottom:14px}
.pd-sec h4{font-family:"Manrope",sans-serif;font-size:12.5px;color:var(--navy);margin:0 0 7px;
  padding-bottom:5px;border-bottom:1px solid #e5e8ef;display:flex;align-items:center;gap:8px}
.pd-sec h4::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--pink);display:inline-block;flex:0 0 auto}
.pd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 22px}
.pd-item{font-size:11.5px;display:flex;justify-content:space-between;gap:10px;border-bottom:1px dotted #e2e6ee;padding:4px 0}
.pd-item .k{color:#6b7385}
.pd-item .v{color:#14213c;font-weight:700;text-align:right}
.pd-notes{font-size:12px;line-height:1.55;white-space:pre-wrap;border:1px solid #e5e8ef;border-radius:8px;padding:11px 12px}
.pd-sign{margin-top:26px;display:grid;grid-template-columns:1fr 1fr;gap:36px}
.pd-sign .s{border-top:1px solid #14213c;padding-top:5px;font-size:10.5px;color:#6b7385;text-align:center}
.pd-foot{margin-top:20px;padding-top:12px;border-top:1px solid #e5e8ef;
  display:flex;justify-content:space-between;align-items:flex-end;font-size:10.5px;color:#6b7385;line-height:1.5}
.pd-foot b{color:var(--navy)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:var(--navy);color:#fff;padding:11px 16px;border-radius:10px;font-size:14px;max-width:90%;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:60;display:none}
.toast.ok{background:#12855b}.toast.err{background:#b3261e}
/* ===== shared έντυπα chrome (header / steps / preview / document) ===== */
.hdrwrap{max-width:860px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 16px 0;}
.apphd{display:flex;align-items:center;gap:12px;background:var(--navy);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;}
.apphd img{height:34px}
.apphd .home{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;border-radius:8px}
.apphd .home:active{opacity:.7}
.apphd .wm .n{font-weight:800;letter-spacing:.12em;font-size:15px;line-height:1}
.apphd .wm .s{font-weight:600;letter-spacing:.36em;font-size:7px;color:#ff8bbb;margin-top:3px}
.apphd .ttl{margin-left:auto;text-align:right;font-weight:700;font-size:13px;max-width:52%}
.steps{display:flex;gap:8px;margin:0}
.steps .s{flex:1;display:flex;align-items:center;gap:8px;justify-content:center;font-size:12px;font-weight:700;color:#93a0b2;padding:9px 6px;border-radius:11px;background:#fff;border:1px solid var(--line)}
.steps .s .num{width:22px;height:22px;border-radius:50%;background:#e6eaf0;color:#93a0b2;display:flex;align-items:center;justify-content:center;font-size:12px}
.steps .s.on{color:#fff;background:var(--navy);border-color:var(--navy)}
.steps .s.on .num{background:var(--pink);color:#fff}
.hide{display:none!important}
.pvnote{font-size:12.5px;color:var(--muted);margin:2px 2px 10px;text-align:center}
#pvwrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
#pvscale{transform-origin:top left}
.doc{width:720px;background:#fff;color:#242a33;font-family:"Manrope",Arial,sans-serif;font-size:13px;line-height:1.5;padding:18px 20px}
.doc .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:2px solid var(--navy);padding-bottom:9px;position:relative}
.doc .hd::after{content:"";position:absolute;left:0;bottom:-2px;width:150px;height:2px;background:var(--pink)}
.doc .brand2{display:flex;align-items:center;gap:11px}
.doc .brand2 img{height:46px}
.doc .wm2 .n{font-weight:800;font-size:19px;letter-spacing:.13em;color:var(--navy);line-height:1}
.doc .wm2 .s{font-weight:700;font-size:7px;letter-spacing:.42em;color:var(--pink);margin-top:4px}
.doc .co{text-align:right;font-size:9.5px;color:var(--muted);line-height:1.5}
.doc .co strong{color:var(--navy)}
.doc h1{font-weight:800;font-size:20px;color:var(--navy);margin:14px 0 0}
.doc .accent{width:60px;height:4px;background:var(--pink);border-radius:2px;margin:8px 0 4px}
.doc .datel{font-weight:700;color:var(--navy);margin:2px 0 8px;font-size:12px}
.doc .props{margin:8px 0 4px}
.doc .frow{display:flex;gap:10px;margin:6px 0;align-items:baseline}
.doc .frow .k{font-weight:700;color:var(--navy);font-size:12px;min-width:120px}
.doc .frow .v2{flex:1;border-bottom:1px solid #cdd5e0;padding-bottom:2px;min-height:1.2em;font-weight:700;color:var(--navy)}
.doc .sect2{font-weight:800;color:var(--navy);font-size:12.5px;letter-spacing:.02em;margin:14px 0 4px;padding-left:10px;border-left:4px solid var(--pink)}
.doc .kv{display:grid;grid-template-columns:1fr 1fr;gap:1px 26px}
.doc .kv .it{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid #edf0f4;padding:3.5px 0;font-size:11.5px;break-inside:avoid}
.doc .kv .it .k{color:#6b7385}
.doc .kv .it .v{font-weight:700;color:var(--navy);text-align:right}
.doc .noteblock{font-size:12px;border:1px solid var(--line);border-radius:8px;padding:10px 12px;white-space:pre-wrap;margin-top:4px}
.doc .ft{margin-top:16px;padding-top:8px;border-top:1px solid var(--line);color:#8a93a1;font-size:8.5px;text-align:center}
@media print{
  html,body{background:#fff!important;padding:0!important;margin:0!important}
  .hdrwrap,#step1,footer.actionbar,.scrim,.pvnote{display:none!important}
  main{max-width:none!important;padding:0!important}
  #step2{display:block!important}
  #pvwrap{border:none!important;box-shadow:none!important;overflow:visible!important;height:auto!important;border-radius:0!important}
  #pvscale{transform:none!important;margin-left:0!important}
  .doc{width:auto!important;padding:0!important}
  @page{size:A4;margin:12mm}
}
</style>
</head>

    {k:"garden", l:"Κήπος", t:"yn"},
    {k:"parking", l:"Θέση στάθμευσης", t:"yn"},
    {k:"pool", l:"Πισίνα", t:"yn"},
    {k:"disabled_access", l:"Πρόσβαση ΑΜΕΑ", t:"yn"},
    {k:"corner", l:"Γωνιακό", t:"yn"},
    {k:"facade", l:"Προσόψεως", t:"yn"},
    {k:"access_type", l:"Πρόσβαση από", t:"seg", opts:["Άσφαλτος","Πεζόδρομος","Χωματόδρομος","Πλακόστρωτο","Χωρίς πρόσβαση"], full:true},
    {k:"orientation", l:"Προσανατολισμός", t:"select", opts:ORIENTATION},
    {k:"sea_distance", l:"Απόσταση από θάλασσα", t:"text", ph:"π.χ. 300μ"},
    {k:"balcony_area", l:"Εμβαδόν μπαλκονιών", t:"num", suf:"τ.μ."}
  ]},
  {title:"Σημειώσεις", fields:[
    {k:"notes", l:"Ελεύθερες σημειώσεις", t:"textarea", full:true, ph:"Οτιδήποτε άλλο χρήσιμο για το ακίνητο ή τον ιδιοκτήτη"}
  ]}
];

const NUMERIC = new Set(["price","area","communal_fees","construction_year","levels","bedrooms",
  "living_rooms","kitchens","bathrooms","wc","plot_area","renovation_year","balcony_area"]);

/* ---------- State ---------- */
const state = {}; // key -> value (string | true/false | undefined)
const LS_DRAFT="fw_draft";


/* ---------- Render ---------- */
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function fieldHTML(f){
  const full = f.full ? "grid-column:1/-1;" : "";
  const req = f.req ? ' <span style="color:var(--pink)">*</span>' : "";
  let inner="";
  if(f.t==="text"||f.t==="tel"||f.t==="email"||f.t==="num"){
    const type = f.t==="num" ? "text" : f.t;
    const im = f.t==="num" ? ' inputmode="decimal"' : (f.t==="tel"?' inputmode="tel"':(f.t==="email"?' inputmode="email"':''));
    const suf = f.suf ? `<span class="suffix">${esc(f.suf)}</span>` : "";
    inner = `<div class="inp ${f.suf?'has-suffix':''}"><input id="fld_${f.k}" name="${f.k}" type="${type}"${im} placeholder="${esc(f.ph||'')}"${f.req?' data-req="1"':''}>${suf}</div>`;
  } else if(f.t==="textarea"){
    inner = `<textarea id="fld_${f.k}" name="${f.k}" placeholder="${esc(f.ph||'')}"></textarea>`;
  } else if(f.t==="select"){
    inner = `<select id="fld_${f.k}" name="${f.k}"><option value="">Επιλογή</option>${f.opts.map(o=>`<option>${esc(o)}</option>`).join("")}</select>`;
  } else if(f.t==="seg"){
    inner = `<div class="seg${f.req?' req':''}" data-seg="${f.k}">${f.opts.map(o=>`<button type="button" data-val="${esc(o)}">${esc(o)}</button>`).join("")}</div>`;
  } else if(f.t==="yn"){
    // rendered as a self-contained row (label inside)
    return `<div class="field" style="${full}">
      <div class="yn-row"><span class="lbl">${esc(f.l)}</span>
        <span class="yn" data-yn="${f.k}">
          <button type="button" class="yes" data-v="yes">ΝΑΙ</button>
          <button type="button" class="no" data-v="no">ΟΧΙ</button>
        </span></div></div>`;
  }
  return `<div class="field" style="${full}"><label for="fld_${f.k}">${esc(f.l)}${req}</label>${inner}</div>`;
}
function typeBlockHTML(){
  return `<div class="field" style="margin-bottom:16px">
      <label>Είδος συναλλαγής <span style="color:var(--pink)">*</span></label>
      <div class="seg req" data-seg="transaction_type" id="txSeg" style="margin-top:2px">
        <button type="button" data-val="Πώληση" style="flex:1">Πώληση</button>
        <button type="button" data-val="Ενοικίαση" style="flex:1">Ενοικίαση</button>
      </div></div>
    <div class="field">
      <label>Κατηγορία ακινήτου <span style="color:var(--pink)">*</span></label>
      <div class="cats" id="catGrid">
        ${CATEGORIES.map((c,i)=>`<button type="button" class="cat" data-cat="${i}">${esc(c.key)}<span class="s">${esc(c.subs.slice(0,3).join(", "))}...</span></button>`).join("")}
      </div>
      <div class="subs" id="subGrid" style="display:none"></div>
    </div>`;
}
function render(){
  const root=document.getElementById("sections");
  root.innerHTML = SECTIONS.map(sec=>{
    const body = sec.special==="type"
      ? typeBlockHTML()
      : `<div class="grid ${sec.grid==='narrow'?'narrow':''} ${sec.fields.every(x=>x.t==='yn')?'yn':''}">${sec.fields.map(fieldHTML).join("")}</div>`;
    return `<section class="card"><h2><span class="dot"></span>${esc(sec.title)}</h2>${sec.hint?`<p class="hint">${esc(sec.hint)}</p>`:""}${body}</section>`;
  }).join("");
  wire();
}

/* ---------- Wiring ---------- */
function wire(){
  // text/select/textarea inputs
  document.querySelectorAll("#sections input, #sections select, #sections textarea").forEach(el=>{
    el.addEventListener("input",()=>{ state[el.name]= el.value; el.classList.remove("invalid"); saveDraft(); });
    el.addEventListener("change",()=>{ state[el.name]= el.value; saveDraft(); });
  });
  // segmented single-choice
  document.querySelectorAll("[data-seg]").forEach(seg=>{
    seg.addEventListener("click",e=>{
      const b=e.target.closest("button[data-val]"); if(!b)return;
      const key=seg.dataset.seg, val=b.dataset.val;
      const on = state[key]===val;
      seg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      if(on){ delete state[key]; } else { b.classList.add("on"); state[key]=val; }
      seg.classList.remove("miss"); saveDraft();
    });
  });
  // yes / no tri-state
  document.querySelectorAll("[data-yn]").forEach(g=>{
    g.addEventListener("click",e=>{
      const b=e.target.closest("button[data-v]"); if(!b)return;
      const key=g.dataset.yn, wantYes=b.dataset.v==="yes";
      const cur=state[key];
      const next = (cur===true&&wantYes)||(cur===false&&!wantYes) ? undefined : wantYes;
      g.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      if(next===true) g.querySelector(".yes").classList.add("on");
      else if(next===false) g.querySelector(".no").classList.add("on");
      if(next===undefined) delete state[key]; else state[key]=next;
      saveDraft();
    });
  });
  // categories
  const catGrid=document.getElementById("catGrid"), subGrid=document.getElementById("subGrid");
  catGrid.addEventListener("click",e=>{
    const c=e.target.closest(".cat"); if(!c)return;
    catGrid.querySelectorAll(".cat").forEach(x=>x.classList.remove("on"));
    c.classList.add("on"); catGrid.classList.remove("miss");
    const idx=+c.dataset.cat; state.category=CATEGORIES[idx].key; delete state.subtype;
    subGrid.style.display="flex";
    subGrid.innerHTML=CATEGORIES[idx].subs.map(s=>`<button type="button" class="pill" data-sub="${esc(s)}">${esc(s)}</button>`).join("");
    saveDraft();
  });
  subGrid.addEventListener("click",e=>{
    const p=e.target.closest(".pill"); if(!p)return;
    subGrid.querySelectorAll(".pill").forEach(x=>x.classList.remove("on"));
    const on = state.subtype===p.dataset.sub;
    if(on){ delete state.subtype; } else { p.classList.add("on"); state.subtype=p.dataset.sub; }
    saveDraft();
  });
}

/* ---------- Draft autosave ---------- */
let draftT;
function saveDraft(){ clearTimeout(draftT); draftT=setTimeout(()=>{
  try{ localStorage.setItem(LS_DRAFT, JSON.stringify(state)); markSaved("Πρόχειρο αποθηκευμένο"); }catch(e){}
},400); }
function markSaved(t){ document.getElementById("savedTag").textContent=t; }
function loadDraft(){
  let raw; try{ raw=localStorage.getItem(LS_DRAFT);}catch(e){}
  if(!raw)return; let d; try{ d=JSON.parse(raw);}catch(e){return;}
  Object.assign(state,d);
  // reflect into UI
  for(const k in d){
    const v=d[k];
    const el=document.querySelector(`[name="${k}"]`);
    if(el){ el.value=v; continue; }
    const seg=document.querySelector(`[data-seg="${k}"]`);
    if(seg){ const b=[...seg.querySelectorAll("button")].find(x=>x.dataset.val===v); if(b)b.classList.add("on"); continue; }
    const yn=document.querySelector(`[data-yn="${k}"]`);
    if(yn){ if(v===true)yn.querySelector(".yes").classList.add("on"); if(v===false)yn.querySelector(".no").classList.add("on"); continue; }
  }
  if(d.category){
    const idx=CATEGORIES.findIndex(c=>c.key===d.category);
    if(idx>=0){
      const cat=document.querySelector(`.cat[data-cat="${idx}"]`); if(cat)cat.classList.add("on");
      const subGrid=document.getElementById("subGrid"); subGrid.style.display="flex";
      subGrid.innerHTML=CATEGORIES[idx].subs.map(s=>`<button type="button" class="pill${d.subtype===s?' on':''}" data-sub="${esc(s)}">${esc(s)}</button>`).join("");
    }
  }
  markSaved("Ανακτήθηκε πρόχειρο");
}

/* ---------- Validation & payload ---------- */
const REQUIRED=[["address","input"],["owner_name","input"],["owner_phone","input"],["transaction_type","seg"],["category","cat"]];
function validate(){
  let firstBad=null;
  for(const [k,kind] of REQUIRED){
    const empty = state[k]===undefined || state[k]==="" || state[k]===null;
    if(!empty) continue;
    if(kind==="input"){ const el=document.querySelector(`[name="${k}"]`); el.classList.add("invalid"); firstBad=firstBad||el; }
    if(kind==="seg"){ const s=document.querySelector(`[data-seg="${k}"]`); s.classList.add("miss"); firstBad=firstBad||s; }
    if(kind==="cat"){ const g=document.getElementById("catGrid"); g.classList.add("miss"); firstBad=firstBad||g; }
  }
  if(firstBad){ firstBad.scrollIntoView({behavior:"smooth",block:"center"}); }
  return !firstBad;
}
function buildPayload(){
  const data={};
  for(const k in state){
    let v=state[k];
    if(v===""||v===undefined) continue;
    if(NUMERIC.has(k) && typeof v==="string"){
      const n=parseFloat(v.replace(/\./g,"").replace(",","."));
      v = isNaN(n)? v : n;
    }
    data[k]=v;
  }
  const parts=[data.transaction_type,data.subtype||data.category,data.address,
    data.price?data.price+"€":null,data.area?data.area+"τ.μ.":null].filter(Boolean);
  return {
    form: "katachorisi",
    title: "Φόρμα Καταχώρησης",
    submitted_at: new Date().toISOString(),
    ref: "AN-"+Date.now().toString(36).toUpperCase(),
    summary: parts.join(" · "),
    data: data
  };
}

/* ---------- Print document (branded, filled) ---------- */
function pdVal(f,v){
  if(v===true) return "Ναι";
  if(v===false) return "Οχι";
  if(f && f.suf && v!=="" && v!=null) return v+" "+f.suf;
  return v;
}
/* ---------- Έγγραφο & PDF (κοινή γραμμή με τα άλλα έντυπα) ---------- */
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function ready(el){
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  const imgs=[].slice.call(el.querySelectorAll("img"));
  await Promise.all(imgs.map(im=>(im.complete&&im.naturalWidth)?0:new Promise(r=>{im.onload=im.onerror=r;})));
  await sleep(120);
}
function OPT(fn){return {margin:[10,10,12,10],filename:fn,image:{type:"jpeg",quality:0.98},
  html2canvas:{scale:2,backgroundColor:"#ffffff",useCORS:true,logging:false,scrollX:0,scrollY:0},
  jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
  pagebreak:{mode:["css","legacy"],avoid:[".it",".frow",".noteblock"]}};}
function GRK(s){var M={'α':'a','ά':'a','β':'v','γ':'g','δ':'d','ε':'e','έ':'e','ζ':'z','η':'i','ή':'i','θ':'th','ι':'i','ί':'i','ϊ':'i','ΐ':'i','κ':'k','λ':'l','μ':'m','ν':'n','ξ':'x','ο':'o','ό':'o','π':'p','ρ':'r','σ':'s','ς':'s','τ':'t','υ':'y','ύ':'y','ϋ':'y','ΰ':'y','φ':'f','χ':'ch','ψ':'ps','ω':'o','ώ':'o'};return String(s==null?'':s).split('').map(function(c){var l=c.toLowerCase();if(M[l]==null)return c;var t=M[l];return c===l?t:(t.charAt(0).toUpperCase()+t.slice(1));}).join('');}
function docFileName(){
  const nm=GRK(state.address||"akinito").replace(/[^\p{L}\p{N}]+/gu,"_").slice(0,28);
  return "katachorisi_"+nm+"_"+new Date().toISOString().slice(0,10)+".pdf";
}
function buildDoc(){
  const logo=document.getElementById("hdrLogo").src;
  const dateStr=new Date().toLocaleDateString("el-GR",{day:"2-digit",month:"2-digit",year:"numeric"});
  let h='<div class="hd"><div class="brand2"><img src="'+logo+'" alt=""><div class="wm2"><div class="n">FOUR WALLS</div><div class="s">REAL ESTATE</div></div></div><div class="co"><strong>FOUR WALLS Real Estate</strong><br>Φραγκίνη 9, 54624 Θεσσαλονίκη<br>Τηλ +30 6907 483 463<br>info@four-walls.gr &middot; four-walls.gr</div></div>';
  h+='<h1>ΦΟΡΜΑ ΚΑΤΑΧΩΡΙΣΗΣ ΑΚΙΝΗΤΟΥ</h1><div class="accent"></div><div class="datel">Θεσσαλονίκη '+dateStr+'</div>';
  const band=[["Συναλλαγή",state.transaction_type],["Κατηγορία",[state.category,state.subtype].filter(Boolean).join(" · ")],
    ["Διεύθυνση",[state.address,[state.tk,state.region].filter(Boolean).join(" ")].filter(Boolean).join(", ")],
    ["Τιμή",state.price?state.price+" €":""],["Εμβαδόν",state.area?state.area+" τ.μ.":""]].filter(x=>x[1]);
  if(band.length) h+='<div class="props">'+band.map(x=>'<div class="frow"><span class="k">'+esc(x[0])+'</span><span class="v2">'+esc(String(x[1]))+'</span></div>').join("")+'</div>';
  // band fields + delivery preference are not repeated in the sections
  const SKIP=new Set(["address","tk","region","price","area","transaction_type","send_to_client"]);
  SECTIONS.forEach(sec=>{
    if(sec.special) return;
    const items=[],notes=[];
    (sec.fields||[]).forEach(f=>{
      const v=state[f.k];
      if(v===undefined||v===""||SKIP.has(f.k)) return;
      if(f.t==="textarea"){ notes.push('<div class="noteblock">'+esc(String(pdVal(f,v)))+'</div>'); return; }
      items.push('<div class="it"><span class="k">'+esc(f.l)+'</span><span class="v">'+esc(String(pdVal(f,v)))+'</span></div>');
    });
    if(!items.length&&!notes.length) return;
    const title=sec.title==="Ακίνητο & ιδιοκτήτης"?"Ιδιοκτήτης":sec.title;
    h+='<div class="sect2">'+esc(title)+'</div>';
    if(items.length) h+='<div class="kv">'+items.join("")+'</div>';
    if(notes.length) h+=notes.join("");
  });
  h+='<div class="ft">FOUR WALLS Real Estate &middot; ΑΦΜ 128148726 &middot; ΔΟΥ Ε΄ Θεσσαλονίκης &middot; ΓΕΜΗ 133619506000</div>';
  return h;
}
function showStep(n){
  document.getElementById("step1").classList.toggle("hide",n!==1);
  document.getElementById("step2").classList.toggle("hide",n!==2);
  document.getElementById("bar1").classList.toggle("hide",n!==1);
  document.getElementById("bar2").classList.toggle("hide",n!==2);
  document.getElementById("st1").classList.toggle("on",n===1);
  document.getElementById("st2").classList.toggle("on",n===2);
  window.scrollTo(0,0);
}
function toPreview(){ document.getElementById("doc").innerHTML=buildDoc(); showStep(2); fit(); }
function toEdit(){ showStep(1); }
function fit(){
  if(document.getElementById("step2").classList.contains("hide")) return;
  const el=document.getElementById("doc"),sc=document.getElementById("pvscale"),wrap=document.getElementById("pvwrap");
  const avail=wrap.clientWidth,z=Math.min(1,avail/720);
  sc.style.transform="scale("+z+")";
  sc.style.marginLeft=Math.max(0,(avail-720*z)/2)+"px";
  wrap.style.height=(el.offsetHeight*z+2)+"px";
}
async function makePdf(mode){
  const src=document.getElementById("doc");
  if(!src.innerHTML) src.innerHTML=buildDoc();
  const holder=document.createElement("div");
  holder.style.cssText="position:absolute;left:0;top:0;width:720px;z-index:-1;background:#fff;";
  holder.innerHTML='<div class="doc">'+src.innerHTML+'</div>';
  document.body.appendChild(holder);
  const el=holder.firstChild; window.scrollTo(0,0); await ready(el);
  try{
    const fn=docFileName();
    if(mode==="save"){ await html2pdf().set(OPT(fn)).from(el).save(); return {fn:fn}; }
    const uri=await html2pdf().set(OPT(fn)).from(el).outputPdf("datauristring");
    return {fn:fn,uri:uri};
  }finally{ document.body.removeChild(holder); }
}
function savePDF(){ try{ window.print(); }catch(e){} }
function toast(msg,type){ const t=document.getElementById("toast"); if(!t) return; t.className="toast "+(type||""); t.textContent=msg; t.style.display="block"; clearTimeout(t._t); t._t=setTimeout(()=>{ t.style.display="none"; },4600); }
function sendLabel(){ return state.send_to_client===true ? "Αποστολή + email στον ιδιοκτήτη" : "Αποστολή"; }
function refreshSendLabel(){ const b=document.getElementById("submitBtn"); if(b&&!b.disabled) b.textContent=sendLabel(); }
function DOCHTML(){var st='';document.querySelectorAll('style').forEach(function(x){st+=x.textContent;});var doc=document.getElementById('doc');var inner=doc&&doc.innerHTML?doc.innerHTML:buildDoc();return '<!doctype html><html lang="el"><head><meta charset="utf-8">'+'<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'+'<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">'+'<style>'+st+'</style>'+'<style>@media print{@page{size:A4;margin:10mm 10mm 12mm}}html,body{background:#fff!important;margin:0;padding:0;}.doc{width:auto!important;padding:0 3mm!important;}</style>'+'</head><body><div class="doc">'+inner+'</div></body></html>';}
async function doSubmit(){
  if(!validate()){ toEdit(); return; }
  if(state.send_to_client===true && !String(state.owner_email||"").trim()){ toast("Συμπλήρωσε το email του ιδιοκτήτη για να του σταλεί αντίγραφο.","err"); toEdit(); return; }
  const btn=document.getElementById("submitBtn");
  btn.disabled=true; btn.textContent="Δημιουργία PDF...";
  const payload=buildPayload();
  try{
    const r=await makePdf("send");
    payload.pdf_base64=r.uri.split(",")[1]; payload.pdf_filename=r.fn; payload.pdf_mime="application/pdf"; payload.doc_html=DOCHTML();
    btn.textContent="Αποστολή...";
    /* Sent or queued, the payload is safe outside the draft — the
       outbox (see _outbox.fw.js) retries it when the network returns. */
    const res=await FWOutbox.submit(payload,"Καταχώριση — "+(state.address||state.owner_name||""));
    try{ localStorage.removeItem(LS_DRAFT); }catch(e){}
    if(res.sent) toast(state.send_to_client===true ? "Στάλθηκε — και στον ιδιοκτήτη." : "Στάλθηκε.","ok");
    else if(res.reason==="auth") toast("Αποθηκεύτηκε. Χρειάζεται σύνδεση χρήστη — άνοιξε ξανά την εφαρμογή για να σταλεί.","err");
    else toast("Δεν υπάρχει σύνδεση — αποθηκεύτηκε και θα σταλεί αυτόματα μόλις βρεθεί δίκτυο.","ok");
  }catch(err){
    toast("Αποτυχία — το έντυπο δεν στάλθηκε ούτε αποθηκεύτηκε.","err");
  }finally{
    btn.disabled=false; btn.textContent=sendLabel();
  }
}

function closeScrim(el){ el.classList.remove("show"); }

/* ---------- Boot ---------- */
document.addEventListener("DOMContentLoaded",()=>{
  render(); loadDraft();
  document.getElementById("toNext").onclick=()=>{ if(validate()) toPreview(); };
  document.getElementById("btnBack").onclick=toEdit;
  const sendYn=document.querySelector('[data-yn="send_to_client"]');
  if(sendYn) sendYn.addEventListener("click",()=>setTimeout(refreshSendLabel,0));
  refreshSendLabel();
  document.getElementById("printBtn").onclick=savePDF;
  document.getElementById("submitBtn").onclick=doSubmit;
  window.addEventListener("resize",fit);
  // κλείσιμο overlay με tap εκτός modal
  document.querySelectorAll(".scrim").forEach(sc=>sc.addEventListener("click",e=>{ if(e.target===sc) closeScrim(sc); }));
});
</script>
