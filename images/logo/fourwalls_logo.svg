  <!-- Horizontal lockup from fourwalls-brand.pdf (see docs/brand.md).
       Both brand groups share a vertical centre at y=70 in their native
       coordinates, so each is wrapped in an outer <g> that scales about that
       line — keeping the cube and wordmark centred on one middle axis:
         · cube ("cube") — scale 1.15 about its centre (63.5, 70)
         · wordmark       — scale 0.66, placed 40u right of the cube, its
                            centre pinned to y=70 (b = 70 - 70.01*0.66)
       viewBox is the measured union of both boxes + 14u padding, so the cube's
       full top (a thin lid/chevron reaching to y≈-11) is never clipped.
       CSS sizes by height only (css/fourwalls.css); keep this ~5.5:1 aspect. -->
