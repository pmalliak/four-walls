# =====================================================================
# Four Walls — Cloudflare Worker config
# ---------------------------------------------------------------------
# Deploys the static site + listings-feed Worker (worker/index.mjs).
# Setup steps (KV namespace, secrets, custom domain, EstatePrime
# webhook registration): docs/listings-feed.md.
# =====================================================================

# Must match the Worker name in the Cloudflare dashboard (Workers Builds).
name = "four-walls"
main = "worker/index.mjs"
compatibility_date = "2026-06-01"

# Custom domains (four-walls.gr zone is on Cloudflare). The apex is the
# canonical production host; www 301s to it (worker/index.mjs). Deploying
# with these routes creates the DNS records — the zone must NOT already
# have A/AAAA/CNAME records for @ or www (delete the old-host ones first).
# webhooks.* serves ONLY the webhook (guard in worker/index.mjs).
routes = [
	{ pattern = "four-walls.gr", custom_domain = true },
	{ pattern = "www.four-walls.gr", custom_domain = true },
	{ pattern = "dev.four-walls.gr", custom_domain = true },
	{ pattern = "webhooks.four-walls.gr", custom_domain = true },
	{ pattern = "forms.four-walls.gr", custom_domain = true },
]
# Keep the workers.dev URL alive too (adding routes disables it by default).
# It bypasses the zone's WAF/bot protection — useful for the CRM webhook.
workers_dev = true

# The whole repo root is the static site. .assetsignore excludes the
# non-site files (worker/, tools/, docs/, config, dev helpers).
[assets]
directory = "./"
binding = "ASSETS"
# Every request goes through the Worker (not just asset misses) so the
# hostname guard in worker/index.mjs can make webhooks.* webhook-only.
run_worker_first = true
# Any path with no matching asset serves the branded 404.html (status 404).
not_found_handling = "404-page"

[[kv_namespaces]]
binding = "LISTINGS_KV"
id = "faf7d0b092d94eb1bdb974c764e3191a"

# Persistent logs in the dashboard (Worker → Observability tab). Console
# output is kept queryable — no need for a live `wrangler tail`.
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[observability.traces]
enabled = true
head_sampling_rate = 1
persist = true

[triggers]
# Nightly reconciliation rebuild — 03:15 UTC = 05:15/06:15 Θεσσαλονίκη.
crons = ["15 3 * * *"]

[vars]
# "1" = feed from sample data (dev); "0" = live EstatePrime API.
SAMPLE_DATA = "0"
# Full webhook URL: https://webhooks.four-walls.gr/listings
WEBHOOK_PATH = "/listings"
# EstatePrime account subdomain: https://<this>.estateprime.gr/api
ESTATEPRIME_SUBDOMAIN = "fourwalls"
# Whitelist: only listings carrying this EstatePrime tag are published.
# Until the tag exists in the CRM, all active listings are published.
FILTER_TAG = "spitogatos"
# «Ακίνητο του μήνα»: the listing carrying this EstatePrime tag gets
# featured:true in the feed and fills the home-page banner. Tag missing
# or nothing tagged -> front-end falls back (FEATURED_ID, then newest).
FEATURED_TAG = "website-featured"

# Secrets (NOT here — set with `npx wrangler secret put <NAME>`):
#   WEBHOOK_KEY              shared secret for the EstatePrime webhook
#   ESTATEPRIME_API_KEY      EstatePrime public API key   (used when SAMPLE_DATA=0)
#   ESTATEPRIME_API_SECRET   EstatePrime secret API key   (used when SAMPLE_DATA=0)
