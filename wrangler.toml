# =====================================================================
# Four Walls — Cloudflare Worker config
# ---------------------------------------------------------------------
# Deploys the static site + listings-feed Worker (worker/index.mjs).
# Setup steps (KV namespace, secrets, custom domain, EstatePrime
# webhook registration): docs/listings-feed.md.
# =====================================================================

# Must match the Worker name in the Cloudflare dashboard (Workers Builds).
name = "four-walls"
main = "worker/index.mjs"
compatibility_date = "2026-06-01"

# The whole repo root is the static site. .assetsignore excludes the
# non-site files (worker/, tools/, docs/, config, dev helpers).
[assets]
directory = "./"
binding = "ASSETS"
# Every request goes through the Worker (not just asset misses) so the
# hostname guard in worker/index.mjs can make webhooks.* webhook-only.
run_worker_first = true

[[kv_namespaces]]
binding = "LISTINGS_KV"
id = "faf7d0b092d94eb1bdb974c764e3191a"

[triggers]
# Nightly reconciliation rebuild — 03:15 UTC = 05:15/06:15 Θεσσαλονίκη.
crons = ["15 3 * * *"]

[vars]
# "1" = feed from sample data; flip to "0" once the EstatePrime adapter
# in worker/lib/estateprime.mjs is verified against their API docs.
SAMPLE_DATA = "1"
WEBHOOK_PATH = "/webhooks/estateprime"

# Secrets (NOT here — set with `npx wrangler secret put <NAME>`):
#   WEBHOOK_KEY           shared secret for the EstatePrime webhook
#   ESTATEPRIME_API_KEY   EstatePrime CRM API key (needed when SAMPLE_DATA=0)
